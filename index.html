<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENA 오리지널 라인업</title>
<script>
/* 첫 페인트 전에 '공개 화면'인지 미리 판별해 편집 UI 깜빡임(FOUC) 방지.
   깃허브 등 http(s) 주소 + #view= 링크가 아니면 공개 화면 → <html>에 pub 부여.
   (file:// = 내 PC 편집/공유본, #view= = 보기링크는 각자 로직이 처리) */
try{
  if(location.protocol!=="file:" && !/^#view=/.test(location.hash||""))
    document.documentElement.classList.add("pub");
}catch(e){}
</script>
<style>
:root{
  --brand:#3830e0; --brand-d:#2a24b0;
  --bg:#f5f6fb; --panel:#fff; --line:#dde0ec; --line2:#eef0f7;
  --ink:#1b1f30; --sub:#71768c;
  --dr:#e0367f; --ye:#3830e0; --biz:#9298a5; --web:#a855f7; --ev:#1a1a1a; --other:#8b94ad;
  --malt:#f6f7ff;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Malgun Gothic","맑은 고딕",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:13px}
header{position:sticky;top:0;z-index:40;background:var(--panel);border-bottom:1px solid var(--line);padding:9px 16px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;box-shadow:0 2px 10px rgba(56,48,224,.06)}
.brand{display:flex;align-items:center;gap:10px;margin-right:6px}
.brand .brandmark{display:flex;flex-direction:column;align-items:flex-start;gap:3px}
.brand img{height:22px;display:block}
.brand .sub{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-.2px}
.brand .sub span{color:var(--brand)}
.brand .dept{font-size:9.5px;font-weight:600;color:var(--sub);border:1px solid var(--line2);border-radius:20px;padding:1px 7px;letter-spacing:-.2px}
.grp{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.grp>label.tit{color:var(--sub);font-weight:600;margin-right:2px;font-size:12px}
button,select,input,textarea{font-family:inherit;font-size:13px}
button{cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 11px;transition:.12s;color:var(--ink)}
button:hover{background:#f4f5fb;border-color:#c6cadd}
button.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
button.primary:hover{background:var(--brand-d)}
select{border:1px solid var(--line);border-radius:8px;padding:5px 8px;background:#fff}
.mchip{border:1px solid var(--line);border-radius:20px;padding:3px 10px;cursor:pointer;user-select:none;background:#fff;color:var(--sub);font-size:12px}
.mchip.on{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:600}
.toggle{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12.5px}
.savedinfo{font-size:11px;color:var(--sub);white-space:nowrap;margin:0 2px;transition:color .3s}
.savedinfo.flash{color:var(--brand);font-weight:700}
.wrap{padding:12px 16px 14px}
.tablewrap{overflow:auto;max-height:var(--twmax,calc(100vh - 132px));border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.03)}
table{border-collapse:separate;border-spacing:0;white-space:nowrap}
th,td{border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);padding:0;height:29px}
thead th{position:sticky;top:0;background:#eef0fa;z-index:20;font-weight:700;text-align:center;color:#3a3f57}
thead tr.months th{top:0;height:28px;font-size:12.5px;border-bottom:1px solid var(--line);border-right:2px solid #cfd3e8}
thead tr.months th.malt{background:#e6e9f8}
thead tr.weeks th{top:28px;height:22px;font-size:11px;color:var(--sub);font-weight:500}
thead tr.weeks th.malt{background:var(--malt)}
th.mfirst,td.mfirst{border-left:2px solid #c3c8e0}
.axis{position:sticky;z-index:15;background:#fff;text-align:center;padding:0 8px}
.axis.cat{left:0;width:76px;min-width:76px;border-right:1px solid var(--line);font-weight:700;font-size:12px}
.axis.day{left:76px;width:56px;min-width:56px;font-weight:700;background:#fafbff;color:#41465c}
.axis.time{left:132px;width:56px;min-width:56px;border-right:2px solid #cfd3e8;font-weight:500;color:var(--sub);font-size:11.5px;background:#fff}
.axis.time.tbd{color:#b9424d;font-style:italic}
.axis.time.addslot{cursor:pointer}
.axis.time.addslot:hover{color:var(--brand);box-shadow:inset 0 0 0 2px var(--brand)}
thead th.axis{z-index:30;background:#eef0fa}
tbody tr:hover td.axis.time{background:#f4f5ff}
td.wk{width:44px;min-width:44px;text-align:center;position:relative}
td.wk.malt{background:var(--malt)}
.newcat td{border-top:2px solid #cbd0e6}
.newday td{border-top:1.5px solid #d3d8ee}
.newsec td{border-top:3px solid var(--brand)}
.bar{position:absolute;inset:2px 2px;border-radius:6px;padding:0 7px;display:flex;align-items:center;gap:4px;overflow:hidden;font-size:11.5px;font-weight:600;color:#fff;background:var(--c);cursor:pointer;line-height:1.05;box-shadow:0 1px 2px rgba(0,0,0,.13);-webkit-print-color-adjust:exact;print-color-adjust:exact}
.bar:hover{filter:brightness(1.08);box-shadow:0 0 0 2px rgba(0,0,0,.18) inset}
.bar.dr{--c:var(--dr)} .bar.ye{--c:var(--ye)} .bar.biz{--c:var(--biz)}
.bar.web{--c:var(--web)} .bar.ev{--c:var(--ev)}
/* 타사: 우선 흰 배경 + 진한 글씨 + 회색 테두리(그리드에서 구분되게) */
.bar.other{--c:var(--other);background:#fff;color:var(--ink);outline:1.4px solid color-mix(in srgb,var(--other) 78%,#fff);outline-offset:-2px;box-shadow:none}
/* 타사 '이미 지난 편성'(현재 주차보다 앞서 끝난 드라마): 옅은 빗금으로 '지난 것' 표시.
   빗금은 아주 연하게, 글씨는 진하게 유지 → 식별은 그대로 쉬움. */
.bar.other.past{background:repeating-linear-gradient(-45deg,#e5e8f0 0 4px,#f4f5fa 4px 8px);color:#4c5261;outline-color:#c7ccd9}
.bar .tt{font-weight:700;font-size:12.5px;letter-spacing:-.2px}
.bar small{opacity:.8;font-weight:500;font-size:9.5px}
.bar.dr small,.bar.ye small,.bar.web small,.bar.biz small{opacity:1;font-weight:700}
.bar .tag{background:rgba(255,255,255,.3);border-radius:4px;padding:0 4px;font-size:10px;font-weight:700}
.barlogo{height:19px;width:auto;max-width:100%;object-fit:contain;display:block;flex:0 0 auto}
/* 삐져나올 후보(ov): 글씨를 한 줄로(nowrap) 두어 실제 폭을 잴 수 있게. 다 들어가면 그대로(흰 글씨) 표시. */
.bar.ov{white-space:nowrap}
.bar.ov .barmain{flex-wrap:nowrap}
/* grow: 렌더 후 측정 결과 '글씨가 막대를 넘침'으로 판정된 막대에만 붙음.
   색 칸은 한 주 그대로 두고 글씨만 오른쪽 빈 칸으로 삐져나오게 + 흰 칸에서 보이도록 검정.
   (예정=tent 막대는 아래 규칙이 이겨 원래 어두운 글씨 유지) */
.bar.grow{overflow:visible;flex-wrap:nowrap;justify-content:flex-start;z-index:6;color:#111}
.bar.grow .barmain{flex-wrap:nowrap}
/* 미정·예정: 빗금 대신 연한 배경 + 점선 테두리 + 진한 글씨 (가독성 우선).
   테두리는 border 대신 outline 사용 — 인쇄 시 표 셀 경계에 가려 상/우변이 사라지는 문제 방지(사방 표시) */
.bar.tent{background:#eef0fb;background:color-mix(in srgb,var(--c) 15%,#fff);color:var(--ink);outline:1.6px dashed var(--c);outline-offset:-2px;box-shadow:none}
.bar.tent small{color:var(--sub);opacity:1}
.bar.tent .tag{background:var(--c);color:#fff}
/* 결방 칸: 프로그램 색의 연한 점선 + '결방' → 앞뒤 막대가 같은 프로그램임을 시각적으로 이어줌 */
.bar.gap{background:repeating-linear-gradient(-45deg,color-mix(in srgb,var(--c) 26%,#fff) 0 4px,color-mix(in srgb,var(--c) 9%,#fff) 4px 8px);color:var(--c);outline:1.3px solid color-mix(in srgb,var(--c) 60%,#fff);outline-offset:-2px;box-shadow:none;justify-content:center;font-size:9px;font-weight:800;letter-spacing:-.3px}
/* 세로로 병합된 막대(관통 세로막대): 두 요일 행 높이를 채우며 글씨는 가운데·줄바꿈 허용 */
.bar.vspan{white-space:normal;flex-wrap:wrap;justify-content:center;text-align:center;line-height:1.15}
.bar.vspan .tt{white-space:normal}
.bar.vspan .barmain{justify-content:center;flex-wrap:wrap}
/* 주말 관통(KGMA 등): 토·일 여러 줄을 하나로 세운 세로막대. 제목을 '위→아래 한 글자씩' 세워서 표시. */
.bar.vtext{writing-mode:vertical-rl;text-orientation:upright;justify-content:center;align-items:center;white-space:nowrap;padding:6px 0;letter-spacing:1px;overflow:hidden}
.bar.vtext .tt{writing-mode:vertical-rl;text-orientation:upright;letter-spacing:2px;font-size:13px;white-space:nowrap}
.bar.vtext .tag,.bar.vtext small{display:none}  /* 세로막대엔 제목만(태그·날짜 숨김) */
tr.drama td{height:27px;border-bottom:none}  /* 제목-출연자 사이 흰 선 제거(한 블록) */
tr.drama .bar{border-radius:6px 6px 0 0;inset:2px 2px 0 2px}  /* 아래 출연자 밴드까지 붙게 */
/* 식자(로고) 드라마: 막대가 제목+출연자 두 줄 차지(rowspan=2).
   왼쪽=제목·일자(위)+출연자(아래), 오른쪽=큰 로고(우측 정렬·두 줄 높이) */
tr.drama .bar.haslogo{border-radius:6px;inset:2px;justify-content:flex-start;align-items:stretch;padding:2px 5px 2px 8px;gap:7px}
tr.drama .bar.haslogo .barlogo{height:auto;max-height:100%;align-self:center;flex:0 0 auto}
.barbody{display:flex;flex-direction:column;justify-content:center;gap:2px;min-width:0;flex:1;overflow:hidden;text-align:left}
.barmain{display:flex;align-items:center;gap:4px;min-width:0;flex-wrap:wrap;text-align:left}
.barcast{font-size:10px;font-weight:600;color:#fff;opacity:.95;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}
tr.castrow td{height:17px;border-bottom:1px solid var(--line2)}
tr.castrow td.wk{border-top:none}
/* 출연자도 드라마 남색 배경으로 강조(제목 막대와 이어지는 한 블록처럼) */
.cast{position:absolute;inset:0 2px 2px;display:flex;align-items:center;padding:0 8px;font-size:10px;color:#fff;font-weight:600;background:var(--dr);border-radius:0 0 6px 6px;overflow:hidden;white-space:nowrap}
/* 예정·미정 드라마: 제목 줄과 출연자 줄을 '바깥 한 틀'로만 점선(사이 선 없음).
   → outline(사방) 대신 border를 써서 제목=위·좌·우, 출연자=좌·우·아래만 점선. 맞닿는 변엔 선 없음. */
tr.drama .bar.tent{outline:none;border:1.6px dashed var(--c);border-bottom:none}
tr.drama .bar.haslogo.tent{border-bottom:1.6px dashed var(--c)}   /* 로고형(한 막대 두 줄)은 사방 틀 유지 */
.cast.tent{background:color-mix(in srgb,var(--dr) 15%,#fff);color:var(--ink);border:1.6px dashed var(--dr);border-top:none}
.cast.tent:empty::after{content:"출연 미정";color:var(--sub);font-weight:600}
.evrow td.wk{height:25px}
.today-col{box-shadow:-2px 0 0 #ef4444 inset}
/* 폭 고정용 숨은 행: 모든 주(열)에 colspan=1 빈 칸을 깔아, 필터로 행이 줄어도 열 너비가 44px 아래로 좁아지지 않게 함(전체 보기와 동일 너비 유지) */
tr.colspacer td{height:0!important;padding:0;border:none;line-height:0;font-size:0}
/* 비교 보기: 안(1안·2안…)별 구분 띠 */
tr.scenband td{background:#e6e9f8;color:var(--brand);font-weight:800;font-size:12.5px;text-align:left;padding:5px 10px;border-top:3px solid var(--brand);border-bottom:1px solid var(--line);letter-spacing:-.2px;position:sticky;left:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
tr.scenband .etarget{color:#e0367f;font-weight:700}
tbody.scenblk{border-bottom:2px solid #cbd0e6}
/* 타사 드라마 라인업: 오리지널과 분리하는 빈 줄 + 회색 제목 띠 + 반복 헤더(채널·요일·시간대·월·주차) */
tr.sectiongap td{height:20px;background:transparent;border-left:none;border-right:none;border-bottom:none;border-top:none}
tr.scenband.otherband td{color:var(--brand);border-top:3px solid var(--brand)}
tr.subhdr th{background:#eef0fa;font-weight:700;text-align:center;color:#3a3f57}
tr.subhdr.months th{height:28px;font-size:12.5px;border-bottom:1px solid var(--line);border-right:2px solid #cfd3e8}
tr.subhdr.months th.malt{background:#e6e9f8}
tr.subhdr.weeks th{height:22px;font-size:11px;color:var(--sub);font-weight:500}
tr.subhdr.weeks th.malt{background:var(--malt)}
tr.subhdr th.axis{background:#eef0fa;z-index:16}
tr.subhdr th.mfirst{border-left:2px solid #c3c8e0}
.hint{color:var(--sub);font-size:12px}
.overlay{position:fixed;inset:0;background:rgba(20,22,40,.5);display:none;align-items:center;justify-content:center;z-index:100}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:16px;width:470px;max-width:94vw;max-height:92vh;overflow:auto;box-shadow:0 24px 70px rgba(0,0,0,.35);position:relative}
.modal h2{margin:0;padding:16px 20px;border-bottom:1px solid var(--line);font-size:15px;color:var(--brand)}
.modal h2.mhead{display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;background:#fff;z-index:3;border-radius:16px 16px 0 0}
.modal h2 .xclose{border:none;background:transparent;color:var(--sub);font-size:19px;line-height:1;padding:2px 8px;border-radius:8px;cursor:pointer;transition:.12s}
.modal h2 .xclose:hover{background:#f0f0f6;color:var(--ink)}
.modal .body{padding:16px 20px}
.modal .body .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal .body .msec+.msec{margin-top:2px}
details.adv{border-top:1px dashed var(--line);margin-top:12px;padding-top:4px}
details.adv>summary{cursor:pointer;font-size:12.5px;color:var(--brand);font-weight:700;list-style:none;padding:6px 2px;user-select:none}
details.adv>summary::-webkit-details-marker{display:none}
details.adv>summary::before{content:"▸ "}
details.adv[open]>summary::before{content:"▾ "}
details.adv>.grid2{margin-top:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/3}
.field label{font-size:12px;color:var(--sub);font-weight:600}
.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;width:100%}
.field textarea{resize:vertical;min-height:48px}
.checks{grid-column:1/3;display:flex;gap:16px;padding:2px 0;flex-wrap:wrap}
.checks label{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink);cursor:pointer}
.daychecks{display:flex;gap:6px;flex-wrap:wrap}
.daychecks label{display:inline-flex;align-items:center;gap:3px;border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:13px;cursor:pointer;user-select:none}
.daychecks input{width:auto;margin:0}
.modal .foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.modal .foot .del{margin-right:auto;color:#dc2626;border-color:#f2c2c2}
.modal .foot .del:hover{background:#fff0f0}
.legend{display:flex;gap:11px;align-items:center;font-size:12px;color:var(--sub);flex-wrap:wrap;margin:9px 2px}
.legend .sw{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-1px;margin-right:4px}
.legend .sw.swtent{background:#e7e9fb;border:1.4px dashed var(--brand);box-sizing:border-box}
.legend .sw.swgap{background:repeating-linear-gradient(-45deg,#9aa3b8 0 2px,#e8eaf1 2px 4px);border:1px solid var(--sub);box-sizing:border-box}
.count{color:var(--sub);font-size:12px}
@page{size:A3 landscape;margin:7mm}
@media print{
  header .noprint,.legend .hint{display:none}
  .tablewrap{max-height:none;overflow:visible;border:none;box-shadow:none}
  body{background:#fff;margin:0}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* 인쇄 시 화면 고정(sticky) 전부 해제 → 머리글만 뜨는 '빈 둘째 장' 방지 */
  header{position:static!important;box-shadow:none}
  thead th,thead th.axis,thead tr.months th,thead tr.weeks th,.axis,tr.scenband td{position:static!important}
  /* 한 행이 페이지 경계에 걸쳐 잘리지 않게 */
  table{page-break-inside:auto}
  tr{page-break-inside:avoid;break-inside:avoid}
  /* 전체(1~12월) 인쇄 시 오른쪽(12월)이 잘리지 않도록 페이지 폭에 맞춰 균등 축소 */
  table{font-size:9.5px;width:100%;table-layout:fixed}
  .axis{position:static!important}
  /* 축 글씨(장르·요일·시간대)도 인쇄 시 축소 */
  .axis.cat{width:46px;min-width:0;font-size:9.5px;padding:0 4px}
  .axis.day{width:32px;min-width:0;font-size:9.5px}
  .axis.time{width:36px;min-width:0;font-size:8.7px}
  th,td.wk{min-width:0;width:auto}
  /* 한 주짜리 막대 글씨가 옆 빈 칸으로 넘쳐 보이도록 셀 넘침 허용(table-layout:fixed라 폭은 그대로) */
  td.wk{overflow:visible}
  /* 표 머리글(월·주차) 인쇄 시 축소 */
  thead tr.months th{height:auto;font-size:10px}
  thead tr.weeks th{height:auto;font-size:8.5px}
  tr.subhdr.months th{height:auto;font-size:10px}
  tr.subhdr.weeks th{height:auto;font-size:8.5px}
  tr.sectiongap td{height:10px}
  /* 세로로 더 담기게 행 높이 축소 → 아래 구매물 넣어도 한 장에 */
  td.wk{height:25px}
  tr.drama td{height:25px}
  tr.castrow td{height:16px}
  /* 화면처럼 한 줄로: 넘치면 줄바꿈 대신 옆 빈 칸으로 넘쳐 표시(색 배경은 한 주만) */
  .bar{font-size:9.5px;line-height:1.1;white-space:nowrap;overflow:visible;flex-wrap:nowrap;align-content:center;padding:1px 4px;border-radius:4px;box-shadow:none}
  .bar .tt{font-size:10px;font-weight:700}
  .bar small{font-size:8.7px;white-space:nowrap}
  .bar.dr small,.bar.ye small,.bar.web small,.bar.biz small{opacity:1;font-weight:700}
  .barlogo{height:15px}
  /* 식자 드라마: 로고를 작게 잡아 옆 텍스트 공간 확보 → 제목·일자·출연자 각 한 줄 */
  tr.drama .bar.haslogo{flex-wrap:nowrap;padding:1px 2px 1px 4px;gap:4px}
  tr.drama .bar.haslogo .barlogo{height:auto;max-height:82%;max-width:42px}
  tr.drama .bar.haslogo .barmain{flex-wrap:nowrap;white-space:nowrap}
  tr.drama .bar.haslogo .tt{font-size:7.6px}
  tr.drama .bar.haslogo .barmain small{font-size:6.2px}
  tr.drama .bar.haslogo .barbody{gap:1px}
  tr.drama .bar.haslogo .barcast{font-size:7px;white-space:nowrap}
  .barcast{font-size:7.3px;white-space:nowrap}
  .cast{font-size:9px;white-space:nowrap;overflow:visible;color:#fff}
}
/* 인쇄 '단일 페이지 강제'용 측정 클래스 — 위 @media print의 크기 규칙을 화면에서도 재현해
   실제 인쇄 높이를 재고 zoom 배율을 계산하기 위한 것(인쇄 직전 잠깐 적용됨). */
body.pf header .noprint,body.pf .legend .hint{display:none}
body.pf .tablewrap{max-height:none;overflow:visible;border:none;box-shadow:none}
body.pf header{position:static}
body.pf table{font-size:9.5px;width:100%;table-layout:fixed}
body.pf .axis.cat{width:46px;min-width:0;font-size:9.5px;padding:0 4px}
body.pf .axis.day{width:32px;min-width:0;font-size:9.5px}
body.pf .axis.time{width:36px;min-width:0;font-size:8.7px}
body.pf th,body.pf td.wk{min-width:0;width:auto}
body.pf td.wk{overflow:visible;height:25px}
body.pf tr.drama td{height:25px}
body.pf tr.castrow td{height:16px}
body.pf thead tr.months th{height:auto;font-size:10px}
body.pf thead tr.weeks th{height:auto;font-size:8.5px}
body.pf tr.subhdr.months th{height:auto;font-size:10px}
body.pf tr.subhdr.weeks th{height:auto;font-size:8.5px}
body.pf tr.sectiongap td{height:10px}
body.pf .bar{font-size:9.5px;line-height:1.1;white-space:nowrap;overflow:visible;flex-wrap:nowrap;padding:1px 4px}
body.pf .bar .tt{font-size:10px}
body.pf .bar small{font-size:8.7px}
body.pf .bar.dr small,body.pf .bar.ye small,body.pf .bar.web small,body.pf .bar.biz small{opacity:1;font-weight:700}
body.pf .barcast{font-size:7.3px;white-space:nowrap}
body.pf .cast{font-size:9px;white-space:nowrap}
/* 상단 '더보기' 드롭다운(백업·공유·초기화 등 가끔 쓰는 버튼 묶음) */
.menuwrap{position:relative;display:inline-block}
.menu{position:absolute;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 32px rgba(0,0,0,.16);padding:6px;display:none;flex-direction:column;gap:2px;min-width:200px;z-index:60}
.menu.on{display:flex}
.menu button{border:none;background:transparent;text-align:left;padding:8px 10px;border-radius:7px;width:100%;font-size:12.5px}
.menu button:hover{background:#f2f3fb}
.menu button.danger{color:#dc2626}
.menu button.danger:hover{background:#fff0f0}
.menusep{height:1px;background:var(--line2);margin:4px 2px}
#moreBtn::after{content:" ▾";color:var(--sub)}
/* 삭제·초기화 되돌리기(Undo) 토스트 */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(16px);background:#1b1f30;color:#fff;border-radius:12px;padding:11px 14px 11px 16px;display:flex;align-items:center;gap:14px;box-shadow:0 10px 34px rgba(0,0,0,.32);font-size:13px;z-index:200;opacity:0;pointer-events:none;transition:opacity .18s,transform .18s}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast button{background:transparent;border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:8px;padding:5px 12px;font-weight:700}
.toast button:hover{background:rgba(255,255,255,.14)}
@media print{.toast,.menu{display:none!important}}
/* 공개(게시) 화면: 편집·안 관리·더보기·추가·저장·게시 버튼 숨김. 필터/표시/연월/인쇄는 유지 */
.pub #scenGrp,.pub #addBtn,.pub #saveWorkBtn,.pub #publishBtn,.pub #savedInfo,.pub .menuwrap,.pub #tgOtherWrap{display:none!important}
.pub tr.scenband{display:none}
/* 공개에서 숨김 처리된 프로그램(편집 화면에서만 보임): 흐리게 + 자물쇠 배지 */
.bar.pubhidden{opacity:.5}
.tag.lock{background:#6b7280;color:#fff}
@media print{.tag.lock{display:none}}
</style>

function fmtISO(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

function mondaysOfMonth(y,m){ const res=[]; let d=new Date(y,m-1,1); const wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); if(d.getMonth()!==m-1||d.getFullYear()!==y)d.setDate(d.getDate()+7); while(d.getFullYear()===y&&d.getMonth()===m-1){res.push(new Date(d)); d.setDate(d.getDate()+7);} return res; }

// ── 한국 공휴일 자동 생성 ───────────────────────────────────────────
// 양력 고정일은 공식(월·일)으로, 음력 기반(설날·부처님오신날·추석)은 해마다
// 양력 날짜가 달라 표로 관리한다([월,일]=그 해 '당일' 기준). 표에 없는 연도는
// 양력 고정 공휴일만 표시한다.
const KOR_LUNAR = {
  2024:{ seol:[2,10], buddha:[5,15], chu:[9,17] },
  2025:{ seol:[1,29], buddha:[5,5],  chu:[10,6] },
  2026:{ seol:[2,17], buddha:[5,24], chu:[9,25] },
  2027:{ seol:[2,6],  buddha:[5,13], chu:[9,15] },
  2028:{ seol:[1,26], buddha:[5,2],  chu:[10,3] },
  2029:{ seol:[2,13], buddha:[5,20], chu:[9,22] },
  2030:{ seol:[2,3],  buddha:[5,9],  chu:[9,12] },
};
// 반환: [{m,d,name}] — 그 연도의 공휴일 목록(설날·추석은 3일 연휴지만 주 단위 표시라 '당일' 하나로 둠)
//   법정 공휴일 + 대체공휴일(관공서의 공휴일에 관한 규정)까지 자동 계산해 함께 반환한다.
function koreanHolidays(year){
  // ① 법정 공휴일(당일)
  const H=[
    {m:1,d:1,name:"신정"}, {m:3,d:1,name:"삼일절"}, {m:5,d:1,name:"노동절"},
    {m:5,d:5,name:"어린이날"}, {m:6,d:6,name:"현충일"}, {m:8,d:15,name:"광복절"},
    {m:10,d:3,name:"개천절"}, {m:10,d:9,name:"한글날"}, {m:12,d:25,name:"성탄절"},
  ];
  if(year>=2026) H.push({m:7,d:17,name:"제헌절"});   // 2026년 공휴일 재지정
  const L=KOR_LUNAR[year];
  if(L){ H.push({m:L.seol[0],d:L.seol[1],name:"설날"});
    H.push({m:L.buddha[0],d:L.buddha[1],name:"부처님오신날"});
    H.push({m:L.chu[0],d:L.chu[1],name:"추석"}); }

  // ② 대체공휴일 계산 -----------------------------------------------------
  const key=dt=>fmtISO(dt);
  const isWknd=dt=>{ const w=dt.getDay(); return w===0||w===6; };   // 일=0, 토=6
  // 겹침 판정용 공휴일 날짜 집합: 노동절 제외(관공서 공휴일 아님), 설·추석은 3일 연휴 전체.
  const holoSet=new Set();
  H.forEach(h=>{ if(h.name==="노동절")return; holoSet.add(key(new Date(year,h.m-1,h.d))); });
  const seolChu=[]; if(L){ seolChu.push({name:"설날",m:L.seol[0],d:L.seol[1]}); seolChu.push({name:"추석",m:L.chu[0],d:L.chu[1]}); }
  seolChu.forEach(o=>{ const c=new Date(year,o.m-1,o.d);
    [-1,0,1].forEach(k=>{ const t=new Date(c); t.setDate(t.getDate()+k); holoSet.add(key(t)); }); });
  const isHol=dt=>holoSet.has(key(dt));

  const subs=[], subSet=new Set();
  // 기준일 다음의 첫 '평일이면서 공휴일도 대체휴일도 아닌' 날짜
  const nextFree=fromDt=>{ const t=new Date(fromDt);
    for(let g=0;g<40;g++){ t.setDate(t.getDate()+1);
      if(!isWknd(t)&&!isHol(t)&&!subSet.has(key(t))) return t; } return t; };

  // 대체 대상 단일일 공휴일(신정·현충일·노동절은 제외). 토·일과 겹치면 대체.
  //   어린이날은 다른 공휴일과 겹쳐도 대체(예: 부처님오신날과 같은 날).
  const SUB_SINGLE=new Set(["삼일절","어린이날","부처님오신날","광복절","개천절","한글날","성탄절","제헌절"]);
  const reqs=[];
  H.forEach(h=>{ if(!SUB_SINGLE.has(h.name))return;
    const dt=new Date(year,h.m-1,h.d);
    let need=isWknd(dt);
    if(h.name==="어린이날"){ const clash=H.some(o=>o!==h&&o.name!=="노동절"&&o.m===h.m&&o.d===h.d); need=need||clash; }
    if(need) reqs.push({after:dt.getTime(), from:dt, count:1, name:h.name});
  });
  // 설날·추석 연휴: 연휴 중 '일요일'인 날 수만큼 대체(토요일은 설·추석 대체 대상 아님).
  seolChu.forEach(o=>{ const c=new Date(year,o.m-1,o.d);
    const days=[-1,0,1].map(k=>{ const t=new Date(c); t.setDate(t.getDate()+k); return t; });
    const cnt=days.filter(t=>t.getDay()===0).length;
    if(cnt>0) reqs.push({after:days[2].getTime(), from:days[2], count:cnt, name:o.name});
  });
  reqs.sort((a,b)=>a.after-b.after);   // 앞선 공휴일부터 대체일 배정(연쇄 겹침 처리)
  // 대체휴일은 '대체공휴일'로 따로 표시하지 않고 원래 공휴일 이름을 그대로 달아준다.
  //   → 원래 공휴일 주와 대체휴일 주가 같은 이름으로 이어져 한 막대로 병합돼 보인다(예: 광복절).
  reqs.forEach(r=>{ let cur=r.from;
    for(let k=0;k<r.count;k++){ const t=nextFree(cur); subs.push({m:t.getMonth()+1,d:t.getDate(),name:r.name,sub:true}); subSet.add(key(t)); cur=t; }
  });

  return H.concat(subs);
}
function dayCount(day){ const D="월화수목금토일"; let n=0; for(const ch of (day||"")) if(D.includes(ch))n++; return Math.max(1,n); }
// 주당 방송 횟수: freq(주1/2/3회) 우선, 없으면 요일 수로 추정(기존 데이터 호환)
function perWeek(p){ if(p.freq==="주3회")return 3; if(p.freq==="주2회")return 2; if(p.freq==="주1회")return 1; return dayCount(p.day); }
// 두 날짜 사이 달 수(양끝 포함): 월1회 회차 계산용
function monthsBetween(aISO,bISO){ const a=new Date(aISO+"T00:00:00"), b=new Date(bISO+"T00:00:00");
  return (b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())+1; }
// 월1회 프로그램이 방송하는 주(월요일) 집합
//   monthWeek 미지정 → 매달 같은 날짜 기준(기존 동작)
//   monthWeek 1~4 → 그 달 '방영 요일'의 N번째 발생일, -1 → 마지막 발생일
const WK_LABEL={"1":"첫째주","2":"둘째주","3":"셋째주","4":"넷째주","-1":"마지막주"};
function monthlySet(p){ if(!p.start)return null; const s=new Date(p.start+"T00:00:00");
  const n=p.episodes||(p.end?monthsBetween(p.start,p.end):1); const out=new Set();
  const wk=p.monthWeek?+p.monthWeek:0; // 1..4 | -1 | 0(=날짜기준)
  // '몇째 주'는 '방영 요일'의 그 달 N번째 발생일(마지막주=마지막 발생일)로 잡는다.
  //   월요일 주차로 세면 8/31(월)처럼 방영 요일이 다음 달로 넘어가 방영일이 어긋난다(예: 마지막주 화 → 9/1).
  const dch=[...DAY_SEQ].find(ch=>(p.day||"").includes(ch));
  const wdIdx=(dch!=null)?DAY_SEQ.indexOf(dch):((s.getDay()+6)%7);
  for(let i=0;i<n;i++){
    if(wk){ const y=s.getFullYear(), mo=s.getMonth()+i, last=new Date(y,mo+1,0).getDate();
      const occ=[]; for(let dd=1;dd<=last;dd++){ const dt=new Date(y,mo,dd); if(((dt.getDay()+6)%7)===wdIdx)occ.push(dt); }
      const t=(wk===-1)?occ[occ.length-1]:occ[Math.min(wk-1,occ.length-1)];
      if(t)out.add(fmtISO(toMonday(fmtISO(t))));
    } else { const d=new Date(s.getFullYear(),s.getMonth()+i,s.getDate()); out.add(fmtISO(toMonday(fmtISO(d)))); }
  } return out; }
// 행 배치용: 조합 요일을 어떤 요일 행에 넣을지 결정.
// 월화·수목은 항상 묶음 한 줄. 금토·토일은 '드라마(ENA 드라마·타사)'일 때만 한 줄로 묶고,
//   예능 토일(KGMA 등 주말 세로막대)은 지금처럼 각 요일 행으로 분리한다.
const COMBINED_ROWS = new Set(["월화","수목"]);
const DRAMA_PAIRS  = new Set(["금토","토일"]);   // 드라마 문맥에서만 한 줄로 합칠 조합
function isRowDrama(p){ return !!p && ((p.section==="ena"&&p.category==="드라마") || p.section==="other"); }
function rowDays(day,dramaCtx){ if(COMBINED_ROWS.has(day)) return [day];
  if(dramaCtx && DRAMA_PAIRS.has(day)) return [day];
  const singles=[...(day||"")].filter(ch=>"월화수목금토일".includes(ch));
  return singles.length>1 ? singles : [day||""]; }
// 요일 체크박스 <-> "월화"/"토일" 문자열 (항상 월화수목금토일 순서로 합침)
const DAY_SEQ="월화수목금토일";

  return [...DAY_SEQ].filter(ch=>s.includes(ch)).join(""); }

function skipSet(p){ return new Set((p.skips||[]).map(x=>{const d=toMonday(x); return d?fmtISO(d):null;}).filter(Boolean)); }
// 그리드는 '주'를 월요일 기준으로 잡지만, 표시용 방영일은 실제 요일 기준으로 보정.
//   (월요일 ISO + 그 프로그램 요일의 오프셋). 예: 9/28(월)+일(6) = 10/4
//   last=true면 종영일용으로 요일 그룹의 '마지막 요일'을 쓴다(월화 드라마 종영일=화요일).
function airDate(iso,day,last){ if(!iso)return iso; const chs=[...DAY_SEQ].filter(ch=>(day||"").includes(ch));
  const off=chs.length?DAY_SEQ.indexOf(last?chs[chs.length-1]:chs[0]):-1;
  if(off<=0)return iso; const d=new Date(iso+"T00:00:00"); d.setDate(d.getDate()+off); return fmtISO(d); }
// late-night slots (00:00~05:59) belong to the previous broadcast day: 00:40 -> 24:40
function timeKey(t){ const m=(t||"").match(/(\d{1,2}):(\d{2})/); if(!m)return 99999; let h=+m[1]; if(h<6)h+=24; return h*60+ +m[2]; }
function timeDisp(t){ const m=(t||"").match(/(\d{1,2}):(\d{2})/); if(!m)return t||""; let h=+m[1]; if(h<6)h+=24; return String(h).padStart(2,"0")+":"+m[2]; }
function effEnd(p){ const s=toMonday(p.start); if(!s)return null;
  if(p.end){const e=toMonday(p.end); if(e>=s)return fmtISO(e);}
  if(p.freq==="월1회"&&p.episodes){ const d=new Date(s.getFullYear(),s.getMonth()+(p.episodes-1),s.getDate()); return fmtISO(toMonday(fmtISO(d))); }
  if(p.episodes){ const per=perWeek(p), sk=skipSet(p); let d=new Date(s), aired=0, guard=0;
    while(guard++<520){ const iso=fmtISO(d); if(!sk.has(iso))aired+=per; if(aired>=p.episodes)return iso; d.setDate(d.getDate()+7); }
    return fmtISO(d); }
  return fmtISO(s); }
// 시작 월요일 sMon에서 per회/주(결방 sk 제외)로 count회를 채우는 마지막 주의 월요일 ISO
function lastWeekFor(sMon, per, sk, count){ if(count<=0)return null; let d=new Date(sMon), aired=0, guard=0;
  while(guard++<520){ const iso=fmtISO(d); if(!sk.has(iso))aired+=per; if(aired>=count)return iso; d.setDate(d.getDate()+7); }
  return fmtISO(d); }
// 편성 변경(move): 한 프로그램을 앞 슬롯/뒤 슬롯 두 개의 논리 프로그램으로 분리
function expandMoves(p){
  const M=p.move&&+p.move.fromEp;
  if(!p.move||!p.start||!p.episodes||!M||M<2||M-1>=p.episodes) return [p];
  const e1=M-1;                                   // 앞부분 회차 수
  const sMon=toMonday(p.start), sk=skipSet(p), per1=perWeek(p);
  const end1=lastWeekFor(sMon, per1, sk, e1);
  const s2=fmtISO(new Date(new Date(end1+"T00:00:00").getTime()+7*864e5)); // 다음 주 월요일
  const part1={...p, episodes:e1, end:null, move:null, _part:1};
  const part2={...p, day:p.move.day, time:p.move.time, start:s2, episodes:p.episodes-e1, end:p.end||null, move:null, _part:2};
  return [part1, part2];
}

// ── 보기 필터(장르·요일) ─────────────────────────────────────
// 데이터를 지우지 않고 'ENA 오리지널만 화면에서 숨김'하는 필터. 다시 누르거나 '전체'로 원상복구.
//   · 타사·행사·기념일(공휴일)은 필터와 무관하게 '표시' 토글대로 항상 보임(고정).
//   · 장르 칩(드라마/예능): 고른 장르의 오리지널만 남김. 아무것도 안 고르면 전체.
//   · 요일 칩: '예능'에만 적용(예능은 요일대로 걸러짐). 드라마는 요일과 무관하게 무조건 보임.
const F_CATS=["드라마","예능"];
const F_DAYS=["월","화","수","목","금","토","일"];
function filterActive(){ return (state.fCat&&state.fCat.size>0)||(state.fDay&&state.fDay.size>0); }
function passFilter(p){
  if(p.section!=="ena") return true;   // 타사·행사·공휴일은 필터 영향 없음(항상 표시)
  const G=state.fCat, D=state.fDay;
  if(G&&G.size){ if(!G.has(p.category))return false; }   // 장르 필터: 고른 장르만
  if(p.category==="예능" && D&&D.size){                    // 요일 필터는 '예능'에만 적용
    if(![...(p.day||"")].some(c=>D.has(c)))return false;
  }
  return true;                                             // 드라마는 요일 무시(무조건 표시)
}
function renderFilters(){
  const cf=document.getElementById("catFilter"), df=document.getElementById("dayFilter");
  if(!cf||!df)return;
  const chip=(txt,on,fn)=>{ const s=document.createElement("span"); s.className="mchip"+(on?" on":""); s.textContent=txt; s.onclick=fn; return s; };

  F_CATS.forEach(c=>cf.appendChild(chip(c, state.fCat.has(c), ()=>{ state.fCat.has(c)?state.fCat.delete(c):state.fCat.add(c); renderFilters(); render(); })));

function isDrama(p){ return p.section==="ena" && p.category==="드라마"; }
function occupies(p,iso){ if(iso<p._s||iso>p._e)return false; if(p._sk&&p._sk.has(iso))return false; if(p._mset&&!p._mset.has(iso))return false; return true; }
// 프로그램이 실제로 방영되는 '주(월요일 ISO)' 집합 — 현재 화면(연도·월 필터)과 무관하게 계산
function airWeeks(p){ const set=new Set(); if(!p.start)return set;
  const s=toMonday(p.start); if(!s)return set; const eIso=effEnd(p); if(!eIso)return set;
  const o={_s:fmtISO(s),_e:eIso,_sk:skipSet(p),_mset:(p.freq==="월1회"&&p.section!=="event")?monthlySet(p):null};
  let d=new Date(s),guard=0; while(guard++<600){ const iso=fmtISO(d); if(iso>o._e)break; if(occupies(o,iso))set.add(iso); d.setDate(d.getDate()+7); }
  return set; }
// 월요일 ISO → "10월 3주차" 같은 표시(도구의 월별 주차 묶음과 동일 기준)
function weekLabel(iso){ const d=new Date(iso+"T00:00:00"); const y=d.getFullYear(), m=d.getMonth()+1;
  const idx=mondaysOfMonth(y,m).map(fmtISO).indexOf(iso); return m+"월 "+(idx>=0?idx+1:"?")+"주차"; }
// 같은 채널(ENA=같은 안 / 타사=같은 채널)·같은 요일·같은 시간대에 방영 주가 겹치는 기존 프로그램을 찾음(있으면 정보 반환)
function findConflict(obj, selfId){
  if(obj.section==="event"||!obj.start||!obj.time) return null;
  const objScen=obj.scen||null;
  const dchars=part=>new Set([...(part.day||"")].filter(c=>DAY_SEQ.includes(c)));
  const mine=expandMoves(obj).map(pt=>({d:dchars(pt),t:pt.time,w:airWeeks(pt)})).filter(m=>m.t&&m.w.size);
  if(!mine.length) return null;
  const peers=DATA.filter(q=> q.id!==selfId && q.section===obj.section && q.section!=="event" && q.start && q.time
    && (obj.section!=="ena" || (q.scen||null)===objScen)
    && (obj.section!=="other" || q.category===obj.category));
  for(const q of peers){
    for(const qp of expandMoves(q)){
      if(!qp.time) continue; const qd=dchars(qp), qw=airWeeks(qp);
      for(const m of mine){
        if(m.t!==qp.time) continue;
        let day=""; for(const c of DAY_SEQ){ if(m.d.has(c)&&qd.has(c))day+=c; }
        if(!day) continue;
        const common=[...m.w].filter(x=>qw.has(x)).sort();
        if(common.length) return {title:q.title, day, time:qp.time, weeks:common};
      }
    }
  }
  return null;
}
function typeClass(p){ if(p.section==="event")return "ev"; if(p.section==="other")return "other";
  if(p.category==="드라마")return "dr"; if(p.category==="웹예능")return "web";
  return p.ptype==="브랜디드" ? "biz" : "ye"; }
function catColor(r){ if(r.section==="event")return "var(--ev)"; if(r.section==="other")return "var(--other)";
  if(r.category==="드라마")return "#c01f63"; if(r.category==="웹예능")return "var(--web)"; if(r.category==="예능")return "var(--ye)"; return "var(--other)"; }
function catRank(s,c){ const o=CAT_ORDER[s]; if(o){const i=o.indexOf(c); if(i>=0)return i;} return 50; }
function chRank(c){ const i=CH_ORDER.indexOf((c||"").trim()); return i>=0?i:CH_ORDER.length; }
function dayRank(d){ const i=DAY_ORDER.indexOf(d); if(i>=0)return i;
  // 시간 미정 조합행(토일·금토 등)은 구성 요일 중 마지막 요일 바로 뒤에 배치(토·일 사이 X)
  const chars=[...(d||"")].filter(ch=>"월화수목금토일".includes(ch));
  if(chars.length){ const j=DAY_ORDER.indexOf(chars[chars.length-1]); return (j<0?99:j)+0.5; }
  return 99; }
// 배경 강조(흰/회색 밴드)용 '요일군': 조합요일과 그 구성 단일요일을 한 묶음으로 본다.
//   월화·월·화 / 수목·수·목 / 금토·금 / 토일·토·일 → 각각 하나. (표기·행은 그대로 각자)
function dayFamily(d){ const i=DAY_ORDER.indexOf(d); if(i<0)return "|"+(d||"");
  if(i<=2)return "월화"; if(i<=5)return "수목"; if(i<=7)return "금토"; if(i<=10)return "토일"; return "_"; }
// 요일 구분: 요일군마다 흰/회 배경을 번갈아 (월별 구분과 같은 방식)
function periodLabel(p){ const m=(p.raw||"").match(/[\(（]\s*([^)）]*\d{1,2}\s*\/\s*\d{1,2}[^)）]*)[\)）]/); if(m)return m[1].trim();
  if(p._plan)return ""; if(p.start){ let t=md(airDate(p._s,p.day))+"~"+md(airDate(p._e,p.day,true));
    if(p.freq==="월1회"){ t+=", 월1회"; if(p.monthWeek&&WK_LABEL[p.monthWeek])t+="·"+WK_LABEL[p.monthWeek]; } else if(p.episodes)t+=", "+p.episodes; return t; } return ""; }
// 타사 드라마 막대 라벨: 날짜 대신 '(회차) - 배우1/배우2'(출연자는 앞 2명까지).
function otherLabel(p){ const ep=p.episodes?`(${p.episodes})`:"";
  const names=p.cast?p.cast.split(/[,\/·]/).map(s=>s.trim()).filter(Boolean).slice(0,2).join("/"):"";
  return (ep&&names)?`${ep} - ${names}`:(ep||names); }

// 마우스 오버(툴팁)용 상세 문구: 제목·요일/시간·방영기간·회차·출연을 여러 줄로. (막대가 좁아 화면에 안 보여도 여기서 다 확인)
function barTitle(p){ const L=[];
  L.push(p.title+(p.draftTitle?" · 가제":"")+(p._plan?" · 예정":""));
  L.push((p.day?p.day+" ":"")+(timeDisp(p.time)||"시간 미정"));
  if(p._plan){ const a=`${p.planYear||"?"}.${p.planMonth||"?"}`, b=`${p.planEndYear||p.planYear||"?"}.${p.planEndMonth||p.planMonth||"?"}`; L.push(`${a} ~ ${b} 편성 예정`); }
  else if(p.start){ const rl=(p.section==="event")?"기간":"방영"; L.push(`${rl} ${md(airDate(p._s,p.day))} ~ ${md(airDate(p._e,p.day,true))}`);
    if(p.freq==="월1회") L.push("월 1회"+(p.monthWeek&&WK_LABEL[p.monthWeek]?" · "+WK_LABEL[p.monthWeek]:""));
    else if(p.episodes) L.push(`총 ${p.episodes}회`); }
  if(p.cast) L.push("출연 "+p.cast);
  if(p.section==="other"&&p.category) L.push("채널 "+p.category);
  return L.join("\n"); }

function render(){
  const monthsSorted=[...state.months].sort((a,b)=>a-b);
  const weeks=[];
  monthsSorted.forEach(m=>{ const mds=mondaysOfMonth(state.year,m); mds.forEach((d,i)=>weeks.push({date:d,iso:fmtISO(d),month:m,first:i===0,malt:monthsSorted.indexOf(m)%2===1})); });
  const secs=[]; if(state.sections.event)secs.push("event"); if(state.sections.ena)secs.push("ena"); if(state.sections.other)secs.push("other");
  const monthsInView=new Set(weeks.map(w=>w.month));
  // 자동 공휴일 → 보이는 주(index)별 이름 배열. 연초(1/1 등)처럼 주 경계가 전년 12월로
  // 넘어가 정확히 맞는 주가 없으면 그 달의 첫 주로 당겨서 표시한다.
  const holByWeek={};
  if(state.holidays && weeks.length){ koreanHolidays(state.year).forEach(h=>{
    const dObj=new Date(state.year,h.m-1,h.d), mIso=fmtISO(toMonday(fmtISO(dObj)));
    let idx=weeks.findIndex(w=>w.iso===mIso);
    if(idx<0 && monthsInView.has(h.m)) idx=weeks.findIndex(w=>w.month===h.m);
    if(idx>=0){ (holByWeek[idx]=holByWeek[idx]||[]).push({name:h.name, md:h.m+"/"+h.d, sub:!!h.sub}); }
  }); }
  const wcls=w=>`${w.first?'mfirst ':''}${w.malt?'malt':''}`.trim();
  function ph(r){ return isDrama(r)?2:1; }
  // build layout of a row: array of {span, prog|null}
  function layout(r){ const segs=[]; let c=0;
    while(c<weeks.length){ const w=weeks[c]; const hit=r.progs.find(p=>occupies(p,w.iso));
      if(hit){ let span=1; while(c+span<weeks.length){ const w2=weeks[c+span]; if(r.progs.find(p=>p.id===hit.id&&occupies(p,w2.iso)))span++; else break; } segs.push({span,prog:hit,at:c}); c+=span; }
      else { // 결방(skip)으로 비는 주: 그 프로그램 방영기간 안이면 gap으로 표시(빈칸이 아니라 '결방' 마커)
        const gp=r.progs.find(p=>p._sk&&p._sk.has(w.iso)&&w.iso>=p._s&&w.iso<=p._e);
        segs.push({span:1,prog:null,gap:gp||null,at:c}); c++; } }
    return segs; }

  // 한 '안'(scenName)의 본문(행사 행 + 프로그램 행들) HTML을 만들어 반환.
  //   타사·행사는 모든 안 공통, ENA 오리지널은 그 안(scen) 것만 포함.
  function scenBody(scenName, secsArg){ secsArg=secsArg||secs;
    let inView=DATA.filter(p=>secsArg.includes(p.section)&&(p.section!=="ena"||p.scen===scenName)&&!(EXPORT_HIDE&&p.pubHide)).flatMap(expandMoves).map(p=>{
      // 매년 반복 행사: 저장된 월·일을 '보고 있는 연도(state.year)'에 대입 → 해마다 자동 표시.
      //   연초(1/1 등)처럼 주 경계가 전년 12월로 넘어가는 날은 그 해 첫 가시 주로 당겨서 보이게 클램프.
      if(p.section==="event" && p.yearly && p.start && weeks.length){
        const sd=new Date(p.start+"T00:00:00"), ed=p.end?new Date(p.end+"T00:00:00"):sd;
        const startD=new Date(state.year,sd.getMonth(),sd.getDate());
        let endD=new Date(state.year,ed.getMonth(),ed.getDate()); if(endD<startD)endD=startD;
        const fm=weeks[0].month, lm=weeks[weeks.length-1].month;
        const spanS=new Date(state.year,fm-1,1), spanE=new Date(state.year,lm,0);   // 가시 월 범위(월 단위)
        if(endD<spanS||startD>spanE) return null;                                    // 보이는 달과 안 겹치면 제외
        const firstIso=weeks[0].iso, lastIso=weeks[weeks.length-1].iso;
        const clamp=iso=> iso<firstIso?firstIso:(iso>lastIso?lastIso:iso);
        return {...p, _s:clamp(fmtISO(toMonday(fmtISO(startD)))), _e:clamp(fmtISO(toMonday(fmtISO(endD)))), _tent:!!p.tentative, _sk:new Set()};
      }
      if(p.start){ const s=toMonday(p.start); const o={...p,_s:fmtISO(s),_e:effEnd(p),_tent:!!p.tentative,_sk:skipSet(p)};
        if(p.freq==="월1회"&&p.section!=="event"){ o._mset=monthlySet(p);
          if(o._mset&&o._mset.size){ const arr=[...o._mset].sort(); o._s=arr[0]; o._e=arr[arr.length-1]; } }
        return o; }
      if(p.tentative && p.planYear && p.planMonth){
        const s=(+p.planYear)*12+(+p.planMonth);
        const e=(+(p.planEndYear||p.planYear))*12+(+(p.planEndMonth||p.planMonth));
        const mw=weeks.filter(w=>{ const k=state.year*12+w.month; return k>=Math.min(s,e)&&k<=Math.max(s,e); });
        if(mw.length) return {...p,_s:mw[0].iso,_e:mw[mw.length-1].iso,_tent:true,_plan:true,_sk:new Set()}; }
      return null;
    }).filter(p=>p);
    inView=inView.filter(p=>weeks.some(w=>occupies(p,w.iso)));
    if(filterActive())inView=inView.filter(passFilter);   // 보기 필터(장르·요일) — 데이터는 그대로, 화면만 걸러냄

    const rowMap=new Map();
    function addToRow(p,dy,time){ const key=[p.section,p.category,dy,time].join("|");
      if(!rowMap.has(key))rowMap.set(key,{section:p.section,category:p.category,day:dy,time,progs:[]}); rowMap.get(key).progs.push(p); }
    const noTime=[];
    inView.filter(p=>p.section!=="event").forEach(p=>{
      if(p.time){ rowDays(p.day,isRowDrama(p)).forEach(dy=>addToRow(p,dy,p.time)); }
      // 시간 미정 조합요일(토일 등): 한 요일 행(맨 위)에만 두고 렌더 후 아래 주말 행들로 세로 확장('주말 관통 세로막대').
      //   (월화·수목은 COMBINED_ROWS라 rowDays가 묶음 한 줄 유지 → 단일 요소)
      else { const dys=rowDays(p.day,isRowDrama(p));
        if(dys.length>1){ p._wkspan=true; noTime.push({p,dy:dys[0],split:true}); }
        else { noTime.push({p,dy:dys[0]||"",split:false}); }
      } });
    const rowFreeFor=(r,p)=>weeks.every(w=>!occupies(p,w.iso)||!r.progs.some(q=>occupies(q,w.iso)));
    // 조합요일(토일) 시간미정 프로그램이 '그 주 결방(gap)한 타임행'을 채우도록 → 토·일 결방 슬롯을 세로로 관통.
    const rowGapFor=(r,p)=>weeks.some(w=>occupies(p,w.iso)&&r.progs.some(q=>q._sk&&q._sk.has(w.iso)&&w.iso>=q._s&&w.iso<=q._e));
    noTime.forEach(({p,dy,split})=>{ let best=null;
      for(const r of rowMap.values()) if(r.section===p.section&&r.category===p.category&&r.day===dy&&r.time&&rowFreeFor(r,p)){
        if(!best||timeKey(r.time)<timeKey(best.time))best=r; }
      // 완전히 빈 타임행이 없으면(예: KGMA가 2주라 겹침): 그 주 결방 슬롯이 있는 타임행에 넣어 그 자리를 세로막대로 채움.
      //   (겹치는 주는 원래 방영 프로그램이 우선 표시되고, 결방 주에만 이 프로그램이 뜸)
      if(!best&&split){ for(const r of rowMap.values()) if(r.section===p.section&&r.category===p.category&&r.day===dy&&r.time&&rowGapFor(r,p)){
        if(!best||timeKey(r.time)<timeKey(best.time))best=r; } }
      if(best)best.progs.push(p); else addToRow(p,dy,""); });
    let rows=[...rowMap.values()];
    rows.sort((a,b)=>{ if(a.section!==b.section)return secsArg.indexOf(a.section)-secsArg.indexOf(b.section);
      if(a.section==="other"){ // 타사: 요일(월~일) → 채널(SBS…MBN, 그 외 이름순 누적) → 시간
        const dr=dayRank(a.day)-dayRank(b.day); if(dr)return dr;
        const chr=chRank(a.category)-chRank(b.category); if(chr)return chr;
        if(a.category!==b.category)return a.category<b.category?-1:1;
        return timeKey(a.time)-timeKey(b.time); }
      const cr=catRank(a.section,a.category)-catRank(b.section,b.category); if(cr)return cr;
      if(a.category!==b.category)return a.category<b.category?-1:1;
      const dr=dayRank(a.day)-dayRank(b.day); if(dr)return dr; return timeKey(a.time)-timeKey(b.time); });

    let body='';
    // 행사·공휴일 행은 1안(첫 번째 안)에만 표시한다. 2안부터는 생략(비교 보기에서도 맨 위 1안 블록에만 나옴).
    if(state.sections.event && secsArg.includes("event") && scenName===state.scenarios[0]){ const evs=inView.filter(p=>p.section==="event");
      // 행사(아시안게임·월드컵 등)는 프로그램처럼 '연속 주'를 한 막대로 병합한다.
      //   중간 주에 공휴일이 겹쳐도 막대가 끊기지 않는다(같은 행사 id면 계속 이어붙임).
      // 공휴일은 '행사가 없는 주'에만 이름으로 표시하고, 같은 이름끼리 이어지는 주는 병합한다(예: 광복절+대체휴일 주).
      const evAt=i=>evs.find(p=>occupies(p,weeks[i].iso));
      const holAt=i=>evAt(i)?[]:(holByWeek[i]||[]);   // 행사가 있는 주는 공휴일 라벨 숨김(행사 막대 우선)
      body+='<tr class="evrow"><td class="axis cat" colspan="3" style="border-right:2px solid #cfd3e8;color:var(--ev);font-weight:700">기념일·행사</td>';
      let ec=0;
      while(ec<weeks.length){ const cc=wcls(weeks[ec]); const ev=evAt(ec);
        if(ev){ // 같은 행사가 이어지는 주를 한 막대로 병합
          let span=1; while(ec+span<weeks.length && (evAt(ec+span)||{}).id===ev.id)span++;
          body+=`<td class="wk ${cc}" colspan="${span}"><div class="bar ev" data-id="${ev.id}" title="${esc(ev.raw||ev.title)}">${esc(ev.title)}</div></td>`; ec+=span; }
        else { const cur=holAt(ec); const curN=cur.map(x=>x.name);
          if(cur.length){ // 같은 공휴일 이름 묶음이 이어지는 주 병합(광복절 주 + 대체휴일 주 등)
            let span=1; while(ec+span<weeks.length){ const nx=holAt(ec+span).map(x=>x.name); if(nx.length===curN.length&&nx.every((v,k)=>v===curN[k]))span++; else break; }
            // 병합된 주들의 실제 날짜를 모아 마우스오버(title)에 표시. 대체휴일은 '대체'로 구분.
            const tip=[]; for(let k=0;k<span;k++){ (holAt(ec+k)).forEach(x=>tip.push(x.sub?`${x.name} 대체 ${x.md}`:`${x.name} ${x.md}`)); }
            body+=`<td class="wk ${cc}" colspan="${span}"><div class="bar ev" title="${esc(tip.join(" · "))}">${esc(curN.join(","))}</div></td>`; ec+=span; }
          else { body+=`<td class="wk ${cc}"></td>`; ec++; } }
      }
      body+="</tr>"; }

    // 축 열 순서: 오리지널 = 장르(1차)·요일(2차), 타사 = 요일(1차)·채널(2차). 시간대는 공통 3열.
    const ax1=r=> r.section==="other" ? (r.day||"") : (r.category||"");
    const ax2=r=> r.section==="other" ? (r.category||"") : (r.day||"");
    rows.forEach((r,i)=>{ const pv=rows[i-1]||{};
      r._a1First=(r.section!==pv.section)||(ax1(r)!==ax1(pv)); r._a2First=r._a1First||(ax2(r)!==ax2(pv)); r._secFirst=(r.section!==pv.section); });
    let dgi=-1, dayBg="#fff", prevFam=null;
    rows.forEach((r,i)=>{ let a1span=0,a2span=0; const pv=rows[i-1]||{};
      // 타사(other) 첫 행 앞에: 빈 줄 + '타사 드라마 라인업' 제목 띠 + 반복 헤더(요일·채널·시간대·월·주차)
      if(r.section==="other" && r._secFirst){ const nCol=3+weeks.length;
        body+=`<tr class="sectiongap"><td colspan="${nCol}"></td></tr>`;
        body+=`<tr class="scenband otherband"><td colspan="${nCol}">타사 드라마 라인업</td></tr>`;
        body+=headerCells("요일","채널","subhdr "); }
      // 흰/연회색 배경 교대 기준 = '요일군(family)' — 수목·수·목, 금토·금 등은 한 밴드로 묶는다.
      //   (표기·행은 그대로 각자. 상위 축=오리지널 장르 / 타사 구분 이 바뀌면 무조건 새 밴드.)
      const _isOther=(r.section==="other");
      const _dayFam=dayFamily(_isOther?ax1(r):ax2(r));
      const _higherChanged=_isOther?(r.section!==pv.section):r._a1First;
      if(_higherChanged||_dayFam!==prevFam){ dgi++; dayBg=(dgi%2)?"#eef0f6":"#ffffff"; }
      prevFam=_dayFam;
      for(let j=i;j<rows.length;j++){ if(rows[j].section===r.section&&ax1(rows[j])===ax1(r))a1span+=ph(rows[j]); else break; }
      for(let j=i;j<rows.length;j++){ if(rows[j].section===r.section&&ax1(rows[j])===ax1(r)&&ax2(rows[j])===ax2(r))a2span+=ph(rows[j]); else break; }
      const drama=isDrama(r);
      const cls=(r._secFirst?'newsec ':(r._a1First?'newcat ':(r._a2First?'newday ':'')))+(drama?'drama':'');
      const segs=layout(r);
      const wideAt={},wideSpan={}; segs.forEach(s=>{ if(s.prog){ if(!(s.prog.id in wideSpan)||s.span>wideSpan[s.prog.id]){wideSpan[s.prog.id]=s.span;wideAt[s.prog.id]=s.at;} } });
      body+=`<tr class="${cls.trim()}" data-day="${esc(r.day||"")}" data-sec="${esc(r.section)}">`;
      // 타사 1차축(요일)은 색 없이 요일 그룹별 배경만 번갈아; 오리지널 1차축(장르)은 장르색 띠 유지
      if(r._a1First){ const a1st=(r.section==="other")?`background:${dayBg}`:`border-left:4px solid ${catColor(r)};color:${catColor(r)}`;
        body+=`<td class="axis cat" rowspan="${a1span}" style="${a1st}">${esc(ax1(r)||"미정")}</td>`; }
      if(r._a2First)body+=`<td class="axis day" rowspan="${a2span}" style="background:${dayBg}">${esc(ax2(r)||"미정")}</td>`;
      // 시간대 셀 클릭 → 그 슬롯(구분·장르/채널·요일·시간)을 미리 채운 새 프로그램 추가 창
      const _slotCls=VIEWONLY?"":" addslot";
      const _slotAttr=VIEWONLY?"":` data-p-sec="${esc(r.section)}" data-p-cat="${esc(r.category||"")}" data-p-day="${esc(r.day||"")}" data-p-time="${esc(r.time||"")}" data-p-type="${esc((r.progs[0]&&r.progs[0].ptype)||"")}" title="클릭 = 이 슬롯에 새 프로그램 추가"`;
      body+=`<td class="axis time${r.time?'':' tbd'}${_slotCls}" rowspan="${ph(r)}" style="background:${dayBg}"${_slotAttr}>${esc(timeDisp(r.time)||"미정")}</td>`;
      segs.forEach((s,si)=>{ const w=weeks[s.at]; const cc=wcls(w);
        if(s.prog){ const p=s.prog; const metaLead=(s.at===wideAt[p.id]); const sub=metaLead?(p.section==="other"?otherLabel(p):periodLabel(p)):"";
          const tag=metaLead?(p.draftTitle?'<span class="tag">가제</span>':(p._plan?'<span class="tag">예정</span>':'')):'';
          const tbd=(metaLead&&!p.time&&r.time)?'<span class="tag">미정</span>':'';
          const mv=(metaLead&&p._part===2)?'<span class="tag">이동</span>':'';
          const lock=(!VIEWONLY&&!SHARE_EDIT&&metaLead&&p.pubHide)?'<span class="tag lock">🔒비공개</span>':''; // 내 편집 화면에서만(공유본 제외), 게시 시 빠지는 프로그램 표시
          const head=`<b class="tt">${esc(p.title)}</b>`;
          const meta=`${tag}${tbd}${mv}${lock}${sub?` <small>${esc(sub)}</small>`:""}`;
          const inner=`${head}${meta}`;
          // 뒤에 이어지는 빈 주(다음 프로그램 전까지) 수 → 짧은 막대 글씨가 옆 빈칸으로 색째 늘어나 읽히게 확장 허용
          let empt=0; for(let k=si+1;k<segs.length;k++){ if(segs[k].prog||segs[k].gap)break; empt+=segs[k].span; }
          // 옆에 빈 주가 있으면 '삐져나올 후보(ov)'로 표시 → 렌더 후 실제 글씨 폭을 재서, 넘칠 때만 grow(검정+삐져나옴)
          const grow=(empt>0)?' ov':'';
          // 타사: 이 막대의 '마지막 주'가 현재 주차보다 앞이면(=이미 종영) '지난 편성'으로 옅은 빗금 표시.
          const _lastW=weeks[s.at+s.span-1]; const _past=(p.section==="other"&&_lastW&&_lastW.iso<todayISO)?' past':'';
          body+=`<td class="wk ${cc}" colspan="${s.span}"><div class="bar ${typeClass(p)}${p._tent?' tent':''}${grow}${p._wkspan?' wkspan':''}${_past}${(!VIEWONLY&&!SHARE_EDIT&&p.pubHide)?' pubhidden':''}" data-id="${p.id}" title="${esc(barTitle(p))}">${inner}</div></td>`; }
        else if(s.gap){ body+=`<td class="wk ${cc}"><div class="bar ${typeClass(s.gap)} gap" title="${esc(s.gap.title)} 결방">결방</div></td>`; }
        else body+=`<td class="wk ${cc}"></td>`; });
      body+="</tr>";
      if(drama){ body+=`<tr class="castrow" data-day="${esc(r.day||"")}" data-sec="${esc(r.section)}">`;
        segs.forEach(s=>{ const w=weeks[s.at]; const cc=wcls(w);

  }

  const MN=["","1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const todayISO=fmtISO(toMonday(fmtISO(new Date())));

  function headerCells(col1, col2, pre){

      return `<tbody class="scenblk">${band}${scenBody(scen,scenSecs)}</tbody>`; }).join("");
    // 타사 드라마 라인업은 맨 아래에 딱 한 번만(표시가 켜져 있을 때).
    if(state.sections.other) bodyHTML+=`<tbody class="scenblk">${scenBody(list[0]||state.activeScen,["other"])}</tbody>`;
  } else { bodyHTML=`<tbody>${scenBody(state.activeScen,secs)}</tbody>`; }
  // 폭 고정 행: 모든 주(열)에 개별 빈 칸을 깔아, 필터로 행이 줄어도 열 너비가 전체 보기와 동일하게 유지되게 함.

  g.querySelectorAll("tbody").forEach(mergeVSpans);

  g.querySelectorAll("tbody").forEach(expandWkspan);

  if(!VIEWONLY) g.querySelectorAll("td.axis.time.addslot").forEach(td=>td.onclick=()=>openModal(null,{sec:td.dataset.pSec,cat:td.dataset.pCat,day:td.dataset.pDay,time:td.dataset.pTime,type:td.dataset.pType}));

// 표 컨테이너 높이를 실제 화면 위치 기준으로 잡아, 바닥(가로 스크롤바)이 항상 화면 하단에 오게 한다.
//   → 가로 스크롤바가 세로 스크롤바처럼 보이는 화면 최하단에 고정된다(헤더·범례 높이가 바뀌어도 자동 보정).
function fitTable(){ const tw=document.querySelector(".tablewrap"); if(!tw)return;
  if(document.body.classList.contains("pf")){ document.documentElement.style.removeProperty("--twmax"); return; } // 인쇄 모드는 전체 표시
  const top=tw.getBoundingClientRect().top;
  const h=Math.max(200,Math.floor(window.innerHeight-top-14));
  document.documentElement.style.setProperty("--twmax",h+"px"); }
window.addEventListener("resize",fitTable);
// 한 tbody 안에서, 바로 아래 행의 '같은 data-id 프로그램 막대'를 세로(rowspan)로 병합.
//   → 시간 미정 토·일(KGMA 등)이 두 요일 행을 세로로 관통하는 한 막대로 보임. 결방(gap) 막대는 제외.
function mergeVSpans(tbody){
  const idOf=cell=>{ const b=cell&&cell.firstElementChild;
    return (b&&b.classList&&b.classList.contains("bar")&&!b.classList.contains("gap"))?b.getAttribute("data-id"):null; };
  let changed=true, guard=0;
  while(changed && guard++<300){
    changed=false;
    const rows=[...tbody.rows];
    const grid=[]; // grid[r][c] = {cell, or, oc} — rowspan/colspan 반영한 셀 점유 격자
    for(let r=0;r<rows.length;r++){ let c=0;
      for(const cell of rows[r].cells){ while(grid[r]&&grid[r][c])c++;
        const cs=cell.colSpan||1, rs=cell.rowSpan||1;
        for(let i=0;i<rs;i++){ grid[r+i]=grid[r+i]||[]; for(let j=0;j<cs;j++)grid[r+i][c+j]={cell,or:r,oc:c}; }
        c+=cs; } }
    for(let r=0;r<rows.length && !changed;r++){ const gr=grid[r]||[];
      for(let c=0;c<gr.length;c++){ const gcur=gr[c];
        if(!gcur||gcur.or!==r||gcur.oc!==c)continue;         // 원점 셀만
        const cell=gcur.cell, id=idOf(cell); if(!id)continue;
        const rs=cell.rowSpan||1; const gbel=(grid[r+rs]||[])[c];
        if(!gbel||gbel.or!==r+rs||gbel.oc!==c)continue;       // 바로 아래도 같은 열 원점 셀
        const bcell=gbel.cell;
        if((bcell.colSpan||1)!==(cell.colSpan||1))continue;
        if(idOf(bcell)!==id)continue;                         // 같은 프로그램 막대여야
        cell.rowSpan=rs+(bcell.rowSpan||1);
        cell.firstElementChild.classList.add("vspan");
        bcell.parentNode.removeChild(bcell);
        changed=true; break;
      }
    }
  }
}
// 주말(토·일) 시간미정 막대를 '그 주 한 칸'에서 아래 주말 행들로 세로 확장.
//   대상 막대(.bar.wkspan) 바로 아래 같은 열이 '빈 칸 또는 결방(gap)'이고 같은 구분의 주말 행이면 흡수(rowspan↑) →
//   흡수가 한 번이라도 되면 .vtext(세로 글씨)로 표시. (예: 토19:50 지구마불 결방자리→토22:00 공백→일19:50 공백 = KGMA 한 줄)
function expandWkspan(tbody){
  let changed=true, guard=0;
  while(changed && guard++<300){
    changed=false;
    const rows=[...tbody.rows];
    const grid=[]; // grid[r][c] = {cell, or, oc}
    for(let r=0;r<rows.length;r++){ let c=0;
      for(const cell of rows[r].cells){ while(grid[r]&&grid[r][c])c++;
        const cs=cell.colSpan||1, rs=cell.rowSpan||1;
        for(let i=0;i<rs;i++){ grid[r+i]=grid[r+i]||[]; for(let j=0;j<cs;j++)grid[r+i][c+j]={cell,or:r,oc:c}; }
        c+=cs; } }
    for(let r=0;r<rows.length && !changed;r++){ const gr=grid[r]||[];
      for(let c=0;c<gr.length;c++){ const gcur=gr[c];
        if(!gcur||gcur.or!==r||gcur.oc!==c)continue;              // 원점 셀만
        const cell=gcur.cell, b=cell.firstElementChild;
        if(!b||!b.classList||!b.classList.contains("wkspan"))continue;
        const rs=cell.rowSpan||1, cs=cell.colSpan||1;
        const belowR=r+rs; if(belowR>=rows.length)continue;
        const belowRow=rows[belowR];
        const bd=belowRow.getAttribute("data-day");             // 아래 행이 같은 구분의 주말(토·일) 행이어야
        if((bd!=="토"&&bd!=="일")||belowRow.getAttribute("data-sec")!==rows[r].getAttribute("data-sec"))continue;
        const gbel=(grid[belowR]||[])[c];
        if(!gbel||gbel.or!==belowR||gbel.oc!==c)continue;         // 바로 아래도 같은 열 원점 셀(딴 막대가 관통 안 함)
        const bcell=gbel.cell;
        if((bcell.colSpan||1)!==cs)continue;
        const bb=bcell.firstElementChild;                        // 빈 칸이거나 결방(gap)만 흡수(실제 막대는 중단)
        if(bb&&!(bb.classList&&bb.classList.contains("gap")))continue;
        cell.rowSpan=rs+(bcell.rowSpan||1);
        b.classList.add("vtext");
        bcell.parentNode.removeChild(bcell);
        changed=true; break;
      }
    }
  }
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function parseSkips(str,startISO){ if(!str)return []; const out=[];
  const sY=startISO?+startISO.slice(0,4):(new Date()).getFullYear();
  const sD=startISO?new Date(startISO+"T00:00:00"):null;
  str.split(/[,\n]+/).forEach(tok=>{ tok=tok.trim(); if(!tok)return; let m,d;
    if((m=tok.match(/^(\d{4})[-.\/](\d{1,2})[-.\/](\d{1,2})$/))){ d=new Date(+m[1],+m[2]-1,+m[3]); }
    else if((m=tok.match(/^(\d{1,2})\s*\/\s*(\d{1,2})$/))){ d=new Date(sY,+m[1]-1,+m[2]);
      if(sD&&d<sD)d=new Date(sY+1,+m[1]-1,+m[2]); }   // M/D earlier than start -> next year
    else return;
    if(!isNaN(d))out.push(fmtISO(toMonday(fmtISO(d)))); });
  return [...new Set(out)]; }

// 시작일·종료일·빈도로 회차 수 자동 계산 (직접 입력값이 있어도 날짜/빈도 변경 시 다시 채움)
function autoEps(){ const g=id=>document.getElementById(id).value.trim();
  const start=g("fStart"), end=g("fEnd"), freq=g("fFreq");
  if(!start||!end)return; const s=toMonday(start), e=toMonday(end); if(!s||!e||e<s)return;
  let eps;
  if(freq==="월1회"){ eps=monthsBetween(start,end); }
  else { const per=freq==="주3회"?3:freq==="주2회"?2:1;
    const sk=new Set(parseSkips(g("fSkips"),fmtISO(s)).map(x=>{const d=toMonday(x);return d?fmtISO(d):null;}).filter(Boolean));
    let d=new Date(s), n=0, guard=0; const eiso=fmtISO(e);
    while(guard++<520){ const iso=fmtISO(d); if(!sk.has(iso))n++; if(iso>=eiso)break; d.setDate(d.getDate()+7); }
    eps=n*per; }
  if(eps>0)document.getElementById("fEps").value=eps; }

    {name:"_rels/.rels",str:`${P}<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`},
    {name:"xl/workbook.xml",str:`${P}<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>${sheetTags}</sheets></workbook>`},
    {name:"xl/_rels/workbook.xml.rels",str:`${P}<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${wbRels}</Relationships>`},

  ];
  sheets.forEach((s,i)=>files.push({name:`xl/worksheets/sheet${i+1}.xml`,str:_ctrSheetXml(s.grid)}));

}

// ── 센터용 월 방영표: 캔버스 렌더러 (PNG/PDF 공용) ─────────────────

const CTR_LAUNCH={bg:"#dce4ff",tx:"#2c24ce"};
const CTR_END   ={bg:"#fbe8c4",tx:"#8a5a00"};
const CTR_SKIP  ={bg:"#fbd8d8",tx:"#c62828"};
const CTR_GENRE ={dr:"#e0367f",ye:"#3830e0",biz:"#9298a5",web:"#a855f7"};   // 드라마·예능·사업형·웹예능(라인업 색과 동일)
let _ctrLogoImg=null, _ctrFontsLoaded=false, _ctrAssetsPromise=null;

function _loadCtrAssets(){
  if(window.__ENA_ASSETS) return Promise.resolve();

  _ctrAssetsPromise=new Promise((res)=>{ const s=document.createElement("script");
    s.src="ena-assets.js"; s.onload=()=>res(); s.onerror=()=>res(); document.head.appendChild(s); });

}
function _ensureCtrAssets(){ return _loadCtrAssets().then(()=>{
  const A=window.__ENA_ASSETS||{}; const jobs=[];
  if(!_ctrFontsLoaded && document.fonts){
    const load=(w,b64)=>{ if(!b64)return; const ff=new FontFace("KT Flow",`url(data:font/ttf;base64,${b64})`,{weight:String(w)}); jobs.push(ff.load().then(f=>document.fonts.add(f)).catch(()=>{})); };
    load(500,A.ktMedium); load(700,A.ktBold); load(900,A.ktBlack); _ctrFontsLoaded=true;
  }

function _rr(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function _wrap(ctx,text,maxW,maxLines){ const fits=s=>ctx.measureText(s).width<=maxW;
  const tokens=String(text).split(" "); const lines=[]; let cur="";
  const addChars=(chunk)=>{ for(const ch of chunk){ if(cur && !fits(cur+ch)){ lines.push(cur); cur=ch; } else cur+=ch; } };
  tokens.forEach((tok,i)=>{ const sp=(i>0&&cur)?" ":"";
    if(fits(cur+sp+tok)){ cur+=sp+tok; }
    else { if(cur){ lines.push(cur); cur=""; } if(fits(tok)) cur=tok; else addChars(tok); } });
  if(cur) lines.push(cur);
  if(lines.length>maxLines){ const keep=lines.slice(0,maxLines); let last=keep[maxLines-1];
    while(last.length>1 && !fits(last+"…")) last=last.slice(0,-1); keep[maxLines-1]=last+"…"; return keep; }
  return lines; }
function _drawCenter(grid,ny,nm){
  const rows=grid.rows;
  const S=2, Lw=1060, M=22, inner=Lw-2*M;
  const CW=[56,128,128,128,128,128,56,132,132];              // 시간,월,화,수,목,금,시간,토,일
  const xs=[]; { let x=M; for(let i=0;i<=CW.length;i++){ xs.push(x); if(i<CW.length)x+=CW[i]; } }
  const top=18, hHero=64, gap1=12, hLeg=22, gap2=10, hH=32, dH=24, pH=27, footH=26;
  const blocks=[]; let r=3;
  while(r<rows.length){ const row=rows[r];
    if(row[1]&&row[1].s==="wk"){ let n=1; while(r+n<rows.length && !(rows[r+n][1]&&rows[r+n][1].s==="wk")) n++; blocks.push({start:r,n}); r+=n; } else r++; }
  let tableH=hH; blocks.forEach(b=>{ tableH+=dH+(b.n-1)*pH; });
  const totalH=top+hHero+gap1+hLeg+gap2+tableH+12+footH+top;
  const cv=document.createElement("canvas"); cv.width=Lw*S; cv.height=Math.ceil(totalH)*S;
  const ctx=cv.getContext("2d"); ctx.scale(S,S);

  let Y=top;
  // 히어로
  const hg=ctx.createLinearGradient(M,0,Lw-M,0); hg.addColorStop(0,"#00009C"); hg.addColorStop(1,"#3C32E1");
  _rr(ctx,M,Y,inner,hHero,12); ctx.fillStyle=hg; ctx.fill();
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  ctx.fillStyle="rgba(255,255,255,.88)"; ctx.font='500 12px "KT Flow"'; ctx.fillText("매일 새로운 ENA · 콘텐츠 편성센터", M+22, Y+26);
  ctx.fillStyle="#fff"; ctx.font='900 24px "KT Flow"'; ctx.fillText(`${ny}년 ${nm}월 오리지널 타이틀 방영 일정`, M+22, Y+51);
  if(_ctrLogoImg){ const lh=22, lw=lh*(_ctrLogoImg.width/_ctrLogoImg.height); ctx.drawImage(_ctrLogoImg, Lw-M-22-lw, Y+(hHero-lh)/2, lw, lh); }
  Y+=hHero+gap1;
  // 범례
  ctx.font='700 12px "KT Flow"'; ctx.textAlign="left"; ctx.textBaseline="middle";
  let lx=M+2; const cy=Y+hLeg/2;
  const chip=(c,label)=>{ ctx.fillStyle=c; _rr(ctx,lx,cy-6,13,13,3); ctx.fill(); lx+=13+7; ctx.fillStyle="#585866"; ctx.fillText(label,lx,cy+1); lx+=ctx.measureText(label).width+22; };
  chip(CTR_LAUNCH.bg,"론칭작"); chip(CTR_END.bg,"종영작"); chip(CTR_SKIP.bg,"결방");
  Y+=hLeg+gap2;
  const tableTop=Y;
  // 헤더행
  const hdr=rows[2];
  ctx.fillStyle="#e9ebf8"; ctx.fillRect(M,Y,inner,hH);
  ctx.font='700 12.5px "KT Flow"'; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillStyle="#2c24ce";
  for(let c=0;c<9;c++){ const cell=hdr[c+2]; if(cell&&cell.v) ctx.fillText(cell.v,(xs[c]+xs[c+1])/2,Y+hH/2+1); }
  Y+=hH;
  // 주 블록
  blocks.forEach(b=>{
    const dr=rows[b.start]; const rowY0=Y+dH;
    ctx.fillStyle="#eef1fb"; ctx.fillRect(M,Y,inner,dH);
    ctx.font='700 12px "KT Flow"'; ctx.fillStyle="#26262f"; ctx.textAlign="center"; ctx.textBaseline="middle";
    for(let c=0;c<9;c++){ const cell=dr[c+2]; if(cell&&cell.s==="date"&&cell.v) ctx.fillText(cell.v,(xs[c]+xs[c+1])/2,Y+dH/2+1); }
    for(let k=1;k<b.n;k++){ const pr=rows[b.start+k]; const ry=rowY0+(k-1)*pH;
      for(let c=0;c<9;c++){ const cell=pr[c+2]; if(!cell)continue; const cx0=xs[c],cx1=xs[c+1],cw=cx1-cx0;
        if(cell.s==="time"){ ctx.fillStyle="#f6f7fc"; ctx.fillRect(cx0,ry,cw,pH); ctx.fillStyle="#585866"; ctx.font='700 11px "KT Flow"'; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(cell.v,(cx0+cx1)/2,ry+pH/2+1); }
        else if(cell.s==="prog"||cell.s==="progNew"||cell.s==="progEnd"||cell.s==="progSkip"){
          let bg=null,tx="#26262f";
          if(cell.s==="progNew"){bg=CTR_LAUNCH.bg;tx=CTR_LAUNCH.tx;}
          else if(cell.s==="progEnd"){bg=CTR_END.bg;tx=CTR_END.tx;}
          else if(cell.s==="progSkip"){bg=CTR_SKIP.bg;tx=CTR_SKIP.tx;}
          if(bg){ ctx.fillStyle=bg; ctx.fillRect(cx0,ry,cw,pH); }
          ctx.fillStyle=tx; ctx.font=(cell.s==="progSkip"?"800":"700")+' 11.5px "KT Flow"'; ctx.textBaseline="middle";
          const pad=8, maxW=cw-pad*2, lines=_wrap(ctx,cell.v,maxW,2), lh=13;
          let ty=ry+pH/2-(lines.length-1)*lh/2;
          ctx.textAlign="center"; lines.forEach(ln=>{ ctx.fillText(ln,(cx0+cx1)/2,ty); ty+=lh; });   // 프로그램 칸: 가운데 정렬
        }
      }
      if(k<b.n-1){ ctx.strokeStyle="#eef0f8"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(M,ry+pH+0.5); ctx.lineTo(M+inner,ry+pH+0.5); ctx.stroke(); }
    }
    Y+=dH+(b.n-1)*pH;
    ctx.strokeStyle="#b9bce8"; ctx.lineWidth=1.5; ctx.beginPath(); const bTop=Y-(dH+(b.n-1)*pH)+0.5; ctx.moveTo(M,bTop); ctx.lineTo(M+inner,bTop); ctx.stroke();
  });
  const tableBot=Y;
  ctx.strokeStyle="#e3e5f2"; ctx.lineWidth=1;
  for(let i=0;i<=9;i++){ ctx.beginPath(); ctx.moveTo(xs[i]+0.5,tableTop); ctx.lineTo(xs[i]+0.5,tableBot); ctx.stroke(); }
  ctx.beginPath(); ctx.moveTo(M,tableBot-0.5); ctx.lineTo(M+inner,tableBot-0.5); ctx.stroke();
  ctx.strokeStyle="#2c24ce"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(M,tableTop+hH); ctx.lineTo(M+inner,tableTop+hH); ctx.stroke();
  ctx.strokeStyle="#b9bce8"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(xs[6]+0.5,tableTop); ctx.lineTo(xs[6]+0.5,tableBot); ctx.stroke();
  Y+=12; ctx.fillStyle="#a6a6b6"; ctx.font='500 11px "KT Flow"'; ctx.textAlign="left"; ctx.textBaseline="middle";
  ctx.fillText(`ENA 콘텐츠 편성센터 · 자동 생성 (${ny}.${String(nm).padStart(2,"0")}) · 스페셜·특집 등 세부 문구는 배포 전 확인`, M, Y+footH/2);
  return cv;
}
// 이미지(JPEG) → 단일 페이지 PDF(A4 가로, 비율 유지·중앙 배치). 외부 라이브러리 없이 직접 조립.
function _jpegPdf(jpeg,iw,ih){
  const enc=s=>{ const b=new Uint8Array(s.length); for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i)&0xff; return b; };
  const PW=842,PH=595,mg=18; const sc=Math.min((PW-2*mg)/iw,(PH-2*mg)/ih);
  const w=iw*sc,h=ih*sc,x=(PW-w)/2,y=(PH-h)/2;
  const parts=[]; let len=0; const off=[]; const push=u=>{ parts.push(u); len+=u.length; };
  push(enc("%PDF-1.4\n%\xff\xff\xff\xff\n"));
  off[1]=len; push(enc("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n"));
  off[2]=len; push(enc("2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n"));
  off[3]=len; push(enc(`3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW} ${PH}] /Resources << /XObject << /Im0 5 0 R >> >> /Contents 4 0 R >>\nendobj\n`));
  const content=`q\n${w.toFixed(2)} 0 0 ${h.toFixed(2)} ${x.toFixed(2)} ${y.toFixed(2)} cm\n/Im0 Do\nQ\n`;
  off[4]=len; push(enc(`4 0 obj\n<< /Length ${content.length} >>\nstream\n${content}endstream\nendobj\n`));
  off[5]=len; push(enc(`5 0 obj\n<< /Type /XObject /Subtype /Image /Width ${iw} /Height ${ih} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpeg.length} >>\nstream\n`));
  push(jpeg); push(enc("\nendstream\nendobj\n"));
  const xrefStart=len; let xref="xref\n0 6\n0000000000 65535 f \n";
  for(let i=1;i<=5;i++) xref+=String(off[i]).padStart(10,"0")+" 00000 n \n";
  push(enc(xref)); push(enc(`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF`));
  const out=new Uint8Array(len); let p=0; parts.forEach(u=>{ out.set(u,p); p+=u.length; });
  return new Blob([out],{type:"application/pdf"});
}
// 오늘 기준 '다음 달' 그리드 생성(공용)

function _dlBlob(blob,name){ const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }

// (구) HTML 표를 .xls로 저장하던 방식 — 현재 미사용(위 exportXLS가 진짜 .xlsx로 대체). 참고용 보존.
function exportXLS_legacyHtml(){
  const grid=document.getElementById("grid");
  const WKW=58;            // 주(날짜) 열 통일 폭(px) — 모든 날짜 열을 같은 폭으로
  const AXW=[60,52,56];    // 1차축(장르/요일)·2차축(요일/채널)·시간대 축 열 폭

    if(bg){ st+=`background-color:${bg};`; cc.setAttribute("bgcolor",bg); }
    if(blw>=3&&bl) st+=`border-left:${Math.round(blw)}px solid ${bl};`;  // 장르 구분 컬러 띠 유지

    else if(b.classList.contains("other")&&b.classList.contains("past")) bgArr=[236,238,244]; // 타사 지난 편성: 빗금은 엑셀에서 투명→흰색이 되므로 옅은 회청색으로 대체

    td.setAttribute("style",`${bg?`background-color:${bg};`:""}color:${col};border:1px solid #c9cce0;font-weight:700;font-size:10.5px;padding:3px 5px;text-align:${gap?"center":"left"};vertical-align:middle;white-space:nowrap;mso-number-format:'\\@'`);
    td.textContent=txt; });

  clone.querySelectorAll("tr.scenband td").forEach(td=>td.setAttribute("style","background-color:#e6e9f8;color:#3830e0;font-weight:800;text-align:left;padding:5px 8px;white-space:nowrap"));
  // 5) 날짜(주) 열 폭 통일 + 축 열 폭 고정 (색을 박은 뒤 폭만 덧붙임)

function encodeShare(){

// ── 깃허브 '게시' (data.json 커밋) ─────────────────────────────
// UTF-8 문자열 → base64 (한글 안전). btoa는 유니코드를 직접 못 다루므로 바이트로 변환 후 인코딩.
function b64encodeUtf8(str){ const bytes=new TextEncoder().encode(str); let bin=""; const CH=0x8000;

function applyPublished(p){
  const arr = Array.isArray(p) ? p : (p && Array.isArray(p.data) ? p.data : null);
  if(!arr) return false;
  DATA = arr;
  if(p && p.scen) localStorage.removeItem(LS_SCEN); // 안 목록은 데이터의 scen 태그에서 다시 도출
  ensureScen();

  return true;
}
function ghGetToken(force){
  let t=localStorage.getItem(LS_TOKEN);
  if(!t || force){
    t=(prompt("깃허브 '게시' 토큰을 붙여넣으세요.\n(github_pat_… 또는 ghp_… — 한 번만 입력하면 이 브라우저에 저장됩니다)", force?"":"")||"").trim();

async function ghPublish(){
  if(VIEWONLY){ alert("보기 전용 화면에서는 게시할 수 없습니다."); return; }
  // 기준 안(1안)에서 '🔒 공개에서 숨김'으로 표시하지 않은 것만 게시한다.
  //   2안 등 다른 내부 검토용 안은 커밋하지 않아 외부에 노출되지 않는다.
  const PUBSCEN=state.scenarios[0]; // 게시 기준 = 첫 번째 안(1안)
  const token=ghGetToken(false); if(!token) return;
  const btn=document.getElementById("publishBtn"); const orig=btn?btn.textContent:"";
  if(btn){ btn.disabled=true; btn.textContent="게시 중…"; }
  const api="https://api.github.com";
  const H={ "Authorization":"Bearer "+token, "Accept":"application/vnd.github+json", "X-GitHub-Api-Version":"2022-11-28" };
  try{
    // 1) 깃허브 Pages 브랜치·경로 파악(루트/ docs 등 자동 대응). 권한 없으면 default_branch로 폴백.
    let branch="", dir="";
    try{ const pr=await fetch(`${api}/repos/${GH_OWNER}/${GH_REPO}/pages`,{headers:H});
      if(pr.ok){ const pg=await pr.json(); if(pg.source){ branch=pg.source.branch||"";
        const p=(pg.source.path||"/"); dir=(p==="/"||p==="")?"":p.replace(/^\//,"").replace(/\/$/,"")+"/"; } } }catch(e){}
    if(!branch){ try{ const rr=await fetch(`${api}/repos/${GH_OWNER}/${GH_REPO}`,{headers:H});
      if(rr.status===401) throw {code:401}; if(rr.ok) branch=(await rr.json()).default_branch||""; }catch(e){ if(e&&e.code===401) throw e; } }
    if(!branch) branch="main";
    const path=dir+GH_DATAPATH;
    // 2) 기존 파일 sha(있으면 갱신, 없으면 새로 생성)
    let sha=null;
    { const gr=await fetch(`${api}/repos/${GH_OWNER}/${GH_REPO}/contents/${path}?ref=${branch}`,{headers:H});
      if(gr.ok){ sha=(await gr.json()).sha; }
      else if(gr.status===401){ throw {code:401}; }
      else if(gr.status!==404){ throw new Error("파일 조회 실패 ("+gr.status+")"); } }
    // 3) 1안 오리지널(숨김 제외) + 행사·공휴일(숨김 제외)만 골라 커밋. 타사·2안 등 내부 안은 게시에서 완전 제외.
    const pubData=DATA.filter(p=> !p.pubHide && (p.section==="ena" ? p.scen===PUBSCEN : p.section==="event"));
    const payload={ v:2, savedAt:new Date().toISOString(), data:pubData, scen:{list:[PUBSCEN], active:PUBSCEN} };
    const body={ message:"편성 업데이트 "+new Date().toLocaleString("ko-KR"), content:b64encodeUtf8(JSON.stringify(payload)), branch };
    if(sha) body.sha=sha;
    const pu=await fetch(`${api}/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`,{method:"PUT",headers:H,body:JSON.stringify(body)});
    if(pu.status===401) throw {code:401};
    if(!pu.ok) throw new Error("게시 실패 ("+pu.status+"): "+(await pu.text()).slice(0,200));
    save();
    alert("게시 완료! 약 1분 뒤 공유 사이트에 반영됩니다.  ("+pubData.length+"개 항목, 🔒숨김 제외)");
  }catch(err){
    if(err&&err.code===401){ localStorage.removeItem(LS_TOKEN); alert("토큰이 올바르지 않거나 만료됐습니다.\n'게시'를 다시 눌러 토큰을 새로 입력해 주세요."); }
    else alert("게시 중 오류: "+(err&&err.message?err.message:err));
  }finally{ if(btn){ btn.disabled=false; btn.textContent=orig; } }
}

    }).catch(()=>{});
  } else {
    // 편집 화면: 이 브라우저에 편집본이 없을 때만 게시본을 시작점으로 불러옴
    let hasLocal=false; try{ hasLocal=!!localStorage.getItem(LS_KEY); }catch(e){}
    if(!hasLocal){
      fetch("data.json",{cache:"no-store"}).then(r=>r.ok?r.json():null).then(p=>{
        if(p && applyPublished(p)){ initControls(); render(); }
      }).catch(()=>{});
    }
  }
})();
</script>
</body>
</html>
